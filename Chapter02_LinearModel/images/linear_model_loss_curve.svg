<svg xmlns="http://www.w3.org/2000/svg" width="800" height="520" viewBox="0 0 800 520" role="img" aria-labelledby="title desc">
  <title id="title">Linear Model Loss Curve</title>
  <desc id="desc">MSE loss for y equals x times w on points (1,2), (2,4), and (3,6).</desc>
  <rect width="800" height="520" fill="#ffffff"/>
  <g stroke="#e5e7eb" stroke-width="1">
    <line x1="80" y1="440" x2="740" y2="440"/>
    <line x1="80" y1="345" x2="740" y2="345"/>
    <line x1="80" y1="250" x2="740" y2="250"/>
    <line x1="80" y1="155" x2="740" y2="155"/>
    <line x1="80" y1="60" x2="740" y2="60"/>
    <line x1="80" y1="60" x2="80" y2="440"/>
    <line x1="245" y1="60" x2="245" y2="440"/>
    <line x1="410" y1="60" x2="410" y2="440"/>
    <line x1="575" y1="60" x2="575" y2="440"/>
    <line x1="740" y1="60" x2="740" y2="440"/>
  </g>
  <g stroke="#111827" stroke-width="2" fill="none">
    <line x1="80" y1="440" x2="740" y2="440"/>
    <line x1="80" y1="440" x2="80" y2="60"/>
  </g>
  <path d="M80 66.7 C146 143 179 217 245 346.7 C311 420 344 440 410 440 C476 440 509 420 575 346.7 C641 217 674 143 740 66.7" fill="none" stroke="#2563eb" stroke-width="4" stroke-linecap="round"/>
  <g fill="#2563eb">
    <circle cx="80" cy="66.7" r="4"/>
    <circle cx="245" cy="346.7" r="4"/>
    <circle cx="410" cy="440" r="4"/>
    <circle cx="575" cy="346.7" r="4"/>
    <circle cx="740" cy="66.7" r="4"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="16" fill="#111827">
    <text x="380" y="500">w</text>
    <text x="20" y="255" transform="rotate(-90 20 255)">Loss</text>
    <text x="292" y="34" font-size="22" font-weight="700">MSE Loss Curve</text>
  </g>
  <g font-family="Arial, sans-serif" font-size="13" fill="#374151">
    <text x="76" y="462">0</text>
    <text x="241" y="462">1</text>
    <text x="406" y="462">2</text>
    <text x="571" y="462">3</text>
    <text x="736" y="462">4</text>
    <text x="46" y="444">0</text>
    <text x="40" y="349">5</text>
    <text x="34" y="254">10</text>
    <text x="34" y="159">15</text>
    <text x="34" y="64">20</text>
  </g>
</svg>
